#file: noinspection SpellCheckingInspection
database:
  host: mysql6.sqlpub.com
  port: 3311
  database: career_backend
  user: <USER>
  password: <PASSWORD>
communication:
  token:
    secret: <SECRET>
    expire: 1800
lite_llm:
  model_name: dashscope/qwen-max
  qwen:
    model_name: dashscope/qwen3.5-plus
  deepseek:
    model_name: dashscope/deepseek-v3-plus
  image:
    model_name: dashscope/qwen-vl-plus
vector:
  model_name: text-embedding-v4
  llm_model_name: qwen-max
llm:
  model_name: qwen-max
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  timeout: 120 # 超时时间
  max_retries: 3 # 最大重试次数
  max_concurrent_requests: 3 # 最大并发请求数
  extra: # 额外参数
    temperature: 0.7
pdf:
  model_name: qwen-vl-plus
  extra:
    temperature: 0.1
image:
  model_name: qwen-vl-plus
  suffix: [ "JPG", "JPEG", "PNG", "BMP", "GIF" ]
  max_size: 10 # 最大尺寸 MB
  max_dimension: 4096 # 最大尺寸
  extra:
    temperature: 0.7
test_question:
  model_name: qwen-max
  timeout: 120
  extra:
    temperature: 0.7
growth_plan_agent:
  model_name: glm-5
  extra:
    temperature: 0.3
    recursion_limit: 12 # 最大递归深度
path_config: # 路径配置，需要绝对路径，否则使用默认路径
  temp: <TEMP_PATH>
  is_clean: true # 程序退出时是否清理临时文件
  log: <LOG_PATH>
  prompt: <PROMPT_PATH>
  data: <DATA_PATH>
milvus:
  local:
    host: 192.168.3.128
    port: 19530
  cloud:
    url: <url>
    token: <token>
chroma_config:
  save_path: <SAVE_PATH>
  model_name: text-embedding-v4
  k: 5
  collection_name:
    default: default_collection
    project_collection: open_source_projects
    intern_collection: internships
    book_collection: books
    video_collection: videos
  extra:
    temperature: 0.7
code_ability:
  model_name: qwen-max
  extra:
    temperature: 0.3
  github_token: <GITHUB_TOKEN>
  gitee_token: <GITEE_TOKEN>
redis:
  host: <HOST>
  port: 0
  username: <USERNAME>
  password: <PASSWORD>
  connect_timeout: 2000 # 连接超时时间，单位毫秒
  cache_timeout:
    default: 86400 # 默认缓存超时时间，单位秒
    file_parse: 86400
    code_ability: 7200
other:
  ssl_verify: false