server:
  port: 8080
spring:
  profiles:
    active: prod #todo
  application:
    name: career-planning-backend
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${host}:${post}/${database_name}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${database_username}
    password: ${database_password}
  # Redis配置
  data:
    redis:
      host: ${redis_host}
      port: ${redis_port}
      username: ${redis_username}
      password: ${redis_password}
      connect-timeout: 2000
  # 邮件配置
  mail:
    host: ${email_host}
    port: ${email_post}
    username: ${MAIL_USERNAME_QQ}
    password: ${MAIL_PASSWORD_QQ}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: false
  # 主应用配置
  main:
    banner-mode: off
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

#spring事务管理日志
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug
    org.springframework.ai: debug
    com.hope.controller.AIController: debug
    com.hope.aspect: debug

#阿里云oss配置
aliyun:
  oss:
    endpoint: ${ALY_OSS_ACCESS_KEY_ENDPOINT} # 阿里云OSS的endpoint
    access-key-id: ${ALY_OSS_ACCESS_KEY_ID} # 阿里云OSS的access-key-id
    access-key-secret: ${ALY_OSS_ACCESS_KEY_SECRET} # 阿里云OSS的access-key-secret
    bucket-name: ${ALY_OSS_ACCESS_KEY_BUCKET} # 阿里云OSS的bucket-name

mybatis-plus:
  global-config:
    banner: false
    db-config:
      id-type: auto
      update-strategy: not_null  # 默认策略：非null更新
      logic-delete-field: deleted  # 逻辑删除字段名
      logic-delete-value: 1        # 已删除的值
      logic-not-delete-value: 0    # 未删除的值
  type-aliases-package: com.backend.careerplanningbackend.domain.po  # 使用你的实体类包
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

communication:
  token:
    secret: ${<SECRET>}
    expire: 1800
ai:
  service:
    base-url: http://localhost:9000
    timeout: 30000
    retry:
      max-attempts: 3
      delay: 1000