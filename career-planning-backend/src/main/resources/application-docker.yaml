# ==================== Docker 环境专用配置 ====================
# 使用方式: SPRING_PROFILES_ACTIVE=docker
# 本文件仅覆盖需要变更的配置项（主机地址等），其余继承 application.yaml + application-prod.yaml

server:
  port: 8080

spring:
  # AI 配置（复用 prod 的模型设置，无需覆盖）
  # 数据源 —— 使用 Docker 服务名替代 IP
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:${MYSQL_PORT:3306}/${MYSQL_DATABASE:career_backend}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:career}
    password: ${MYSQL_PASSWORD:career_dev_2025}

  # Redis —— 使用 Docker 服务名
  data:
    redis:
      host: redis
      port: 6379
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:redis_dev_2025}
      connect-timeout: 2000

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:mq_dev_2025}
    virtual-host: ${RABBITMQ_VHOST:/user-career-agent}
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 1

  # 邮件 —— 从环境变量读取
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: false

  main:
    banner-mode: off
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# 日志级别
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: info
    org.springframework.ai: info
    com.hope.controller.AIController: info
    com.hope.aspect: info

# 阿里云 OSS
aliyun:
  oss:
    endpoint: ${ALY_OSS_ACCESS_KEY_ENDPOINT}
    access-key-id: ${ALY_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALY_OSS_ACCESS_KEY_SECRET}
    bucket-name: ${ALY_OSS_ACCESS_KEY_BUCKET}

mybatis-plus:
  global-config:
    banner: false
    db-config:
      id-type: auto
      update-strategy: not_null
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    type-aliases-package: com.backend.careerplanningbackend.domain.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Token
communication:
  token:
    secret: ${COMMUNICATION_TOKEN_SECRET:CareerAgent}
    expire: 1800

# AI 服务地址 —— Docker 内部使用服务名
ai:
  service:
    base-url: http://ai-service:${AI_SERVICE_PORT}
    timeout: 300000
    retry:
      max-attempts: 3
      delay: 1000

# JWT
jwt:
  secret: ${JWT_SECRET:ThisIsSecretKeyForHelloWorldProject2025}

# 支付宝
alipay:
  app-id: ${ALIPAY_APP_ID}
  private-key: ${ALIPAY_PRIVATE_KEY}
  public-key: ${ALIPAY_PUBLIC_KEY}
  gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  notify-url: ${ALIPAY_NOTIFY_URL:http://${SERVER_HOST:localhost}:8080/api/alipay/toSuccess}
  return-url: ${ALIPAY_RETURN_URL:http://${SERVER_HOST:localhost}:8080/api/alipay/toSuccess}
