#spring事务管理日志
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug
    org.springframework.ai: debug
    com.backend.careerplanningbackend.controller.AIController: debug

#阿里云oss配置
aliyun:
  oss:
    endpoint: ${ALY_OSS_ACCESS_KEY_ENDPOINT} # 阿里云OSS的endpoint
    access-key-id: ${ALY_OSS_ACCESS_KEY_ID} # 阿里云OSS的access-key-id
    access-key-secret: ${ALY_OSS_ACCESS_KEY_SECRET} # 阿里云OSS的access-key-secret
    bucket-name: ${ALY_OSS_ACCESS_KEY_BUCKET} # 阿里云OSS的bucket-name

mybatis-plus:
  global-config:
    banner: false
    db-config:
      id-type: auto
  type-aliases-package: com.backend.careerplanningbackend.domain.po  # 使用你的实体类包
  configuration:
    map-underscore-to-camel-case: true
#    控制台输出
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl 
    mapper-locations: classpath:mapper/*.xml

