    username: root_backend
    password: pUEDMcWMtbRcqnuI
  # Redis配置
  data:
    redis:
      host: redis-19435.crce178.ap-east-1-1.ec2.cloud.redislabs.com
      port: 19435
      username: default
      password: Kd5PCe6qUkpzwhGCerZb0KJsW5JMn6ZT
      connect-timeout: 2000
  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_USERNAME_QQ}
    password: ${MAIL_PASSWORD_QQ}
